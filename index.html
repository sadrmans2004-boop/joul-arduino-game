<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Joul Engineering Academy - Task Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="col-side">
            <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="arduino">Arduino Uno</div>
            <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="led">Red LED</div>
            <div class="drag-item" draggable="true" ondragstart="drag(event)" data-node="sensor">Sensor</div>
            <hr>
            <div id="task-info">
                <h3>المهمة 1</h3>
                <p>وصل الحساس بالمنفذ A0</p>
            </div>
            <button id="check-btn">تحقق من التوصيل</button>
        </div>
        <div class="col-main">
            <div id="drawflow"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
